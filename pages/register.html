<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация – Foundation of Code</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .auth-wrap {
      min-height: calc(100vh - 60px); display: flex; align-items: center;
      justify-content: center; padding: 40px 24px;
      background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(99,102,241,0.12) 0%, transparent 70%);
    }
    .auth-box {
      background: rgba(13,13,30,0.97); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px; padding: 48px 44px; width: 100%; max-width: 460px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }
    .auth-logo { text-align: center; margin-bottom: 32px; }
    .auth-logo .logo-icon {
      width: 48px; height: 48px; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700; color: #fff; margin: 0 auto 12px;
    }
    .auth-logo h1 { color: #fff; font-size: 22px; font-weight: 700; font-family: var(--mono); }
    .auth-logo p  { color: var(--muted); font-size: 14px; margin-top: 4px; }

    .tabs { display: flex; background: rgba(255,255,255,0.04); border-radius: 10px; padding: 4px; margin-bottom: 32px; }
    .tab-btn {
      flex: 1; padding: 9px; border: none; border-radius: 7px;
      font-family: var(--sans); font-size: 14px; font-weight: 500; cursor: pointer;
      background: transparent; color: var(--muted); transition: all 0.2s;
    }
    .tab-btn.active { background: rgba(99,102,241,0.25); color: #a5b4fc; font-weight: 600; }

    .name-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .form-group { margin-bottom: 18px; }
    .form-label { display: block; color: rgba(255,255,255,0.6); font-size: 13px; font-weight: 500; margin-bottom: 7px; }
    .form-input {
      width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 12px 16px; color: #fff; font-size: 14px; font-family: var(--sans);
      outline: none; transition: border-color 0.2s;
    }
    .form-input:focus { border-color: rgba(99,102,241,0.5); background: rgba(99,102,241,0.06); }
    .form-input::placeholder { color: rgba(255,255,255,0.2); }
    .form-input.error { border-color: rgba(244,63,94,0.6); }

    .submit-btn {
      width: 100%; padding: 13px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; font-size: 15px; font-weight: 600; font-family: var(--sans);
      cursor: pointer; margin-top: 6px; transition: all 0.2s;
      box-shadow: 0 0 30px rgba(99,102,241,0.3);
    }
    .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 0 50px rgba(99,102,241,0.5); }
    .submit-btn:disabled { opacity: 0.5; cursor: default; transform: none; }

    .auth-footer { text-align: center; margin-top: 24px; color: var(--muted); font-size: 13px; }
    .auth-footer a { color: #a5b4fc; cursor: pointer; }

    .error-msg {
      background: rgba(244,63,94,0.1); border: 1px solid rgba(244,63,94,0.25);
      border-radius: 10px; color: #fb7185; padding: 12px 16px;
      font-size: 13.5px; margin-bottom: 18px; display: none;
    }
    .success-msg {
      background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25);
      border-radius: 10px; color: var(--green); padding: 14px 16px;
      font-size: 14px; text-align: center; display: none; margin-top: 16px;
    }
    .check-container {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 20px;
      cursor: pointer;
      user-select: none;
    }
    .check-container input {
      position: absolute;
      opacity: 0;
      cursor: pointer;
      height: 0;
      width: 0;
    }
    .checkmark {
      width: 18px;
      height: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 5px;
      flex-shrink: 0;
      position: relative;
      transition: all 0.2s;
      margin-top: 2px;
    }
    .check-container:hover input ~ .checkmark {
      border-color: rgba(99, 102, 241, 0.4);
      background: rgba(255, 255, 255, 0.08);
    }
    .check-container input:checked ~ .checkmark {
      background: var(--accent);
      border-color: var(--accent);
    }
    .checkmark:after {
      content: "";
      position: absolute;
      display: none;
    }
    .check-container input:checked ~ .checkmark:after {
      display: block;
    }
    .check-container .checkmark:after {
      left: 5px;
      top: 2px;
      width: 5px;
      height: 9px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }
    .check-text {
      color: rgba(255, 255, 255, 0.45);
      font-size: 13px;
      line-height: 1.5;
    }
    .check-text a {
      color: #a5b4fc;
      text-decoration: none;
      transition: color 0.15s;
    }
    .check-text a:hover {
      color: #c7d2fe;
      text-decoration: underline;
    }

    .field-hint { font-size: 11.5px; color: rgba(255,255,255,0.22); margin-top: 5px; }

    /* Logged-in state */
    .already-logged {
      text-align: center; padding: 24px 0;
    }
    .already-logged .av {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 700; color: #fff; margin: 0 auto 16px;
    }
    .already-logged h3 { color: #fff; font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .already-logged p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
    .logout-btn {
      background: rgba(244,63,94,0.1); border: 1px solid rgba(244,63,94,0.25);
      color: #fb7185; padding: 9px 20px; border-radius: 8px;
      font-family: var(--sans); font-size: 14px; cursor: pointer; transition: all 0.15s;
    }
    .logout-btn:hover { background: rgba(244,63,94,0.2); }
  </style>
</head>
<body>
<nav class="navbar" id="navbar"></nav>
<main class="page">
  <div class="auth-wrap">
    <div class="auth-box" id="auth-box">

      <div class="auth-logo">
        <div class="logo-icon">F</div>
        <h1>Foundation of Code</h1>
        <p id="auth-subtitle">Создай аккаунт и начни учиться</p>
      </div>

      <!-- Already logged in -->
      <div id="state-logged" style="display:none" class="already-logged">
        <div class="av" id="al-avatar"></div>
        <h3 id="al-name"></h3>
        <p id="al-sub"></p>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
          <a href="profile.html" class="btn-primary" style="display:inline-block;padding:10px 22px;font-size:14px">Мой профиль →</a>
          <button class="logout-btn" onclick="doLogout()">Выйти</button>
        </div>
      </div>

      <!-- Auth forms -->
      <div id="state-auth">
        <div class="tabs">
          <button class="tab-btn active" id="tab-reg" onclick="switchTab('reg')">Регистрация</button>
          <button class="tab-btn" id="tab-login" onclick="switchTab('login')">Войти</button>
        </div>

        <!-- REGISTER -->
        <div id="form-reg">
          <div class="error-msg" id="reg-error"></div>
          <div class="name-row">
            <div class="form-group">
              <label class="form-label">Имя</label>
              <input class="form-input" type="text" placeholder="Вячеслав" id="reg-first">
            </div>
            <div class="form-group">
              <label class="form-label">Фамилия</label>
              <input class="form-input" type="text" placeholder="Федоренко" id="reg-last">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" type="email" placeholder="you@example.com" id="reg-email">
            <!-- Email live hint -->
            <div id="email-hint-wrapper" style="margin-top: 8px; display: none;">
              <div id="email-hint-text" style="font-size: 11px; font-weight: 500;"></div>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Пароль</label>
            <input class="form-input" type="password" placeholder="Минимум 8 символов" id="reg-password">
            <!-- Password strength indicator -->
            <div id="password-strength-wrapper" style="margin-top: 8px; display: none;">
              <div style="height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden;">
                <div id="password-strength-bar" style="height: 100%; width: 0%; transition: all 0.3s; background: #f43f5e;"></div>
              </div>
              <div id="password-strength-text" style="font-size: 11px; margin-top: 4px; font-weight: 500;"></div>
            </div>
            <div class="field-hint">Буквы, цифры и спецсимволы</div>
          </div>
          <div class="form-group">
            <label class="form-label">Повторите пароль</label>
            <input class="form-input" type="password" placeholder="Повторите пароль" id="reg-password2">
          </div>
          <label class="check-container">
            <input type="checkbox" id="agree">
            <span class="checkmark"></span>
            <span class="check-text">Я соглашаюсь с <a href="terms.html" target="_blank">условиями использования</a> и <a href="privacy.html" target="_blank">политикой конфиденциальности</a></span>
          </label>
          <button class="submit-btn" onclick="doRegister()">Создать аккаунт</button>
          <div class="success-msg" id="reg-success">✅ Аккаунт создан! Переходим в профиль...</div>
          <div class="auth-footer">Уже есть аккаунт? <a onclick="switchTab('login')">Войти</a></div>
        </div>

        <!-- LOGIN -->
        <div id="form-login" style="display:none">
          <div class="error-msg" id="login-error"></div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" type="email" placeholder="you@example.com" id="login-email">
          </div>
          <div class="form-group">
            <label class="form-label">Пароль</label>
            <input class="form-input" type="password" placeholder="Ваш пароль" id="login-password">
          </div>
          <div style="text-align:right;margin-bottom:18px">
            <a href="#" style="color:#a5b4fc;font-size:13px">Забыли пароль?</a>
          </div>
          <button class="submit-btn" onclick="doLogin()">Войти</button>
          <div class="success-msg" id="login-success">✅ Добро пожаловать! Переходим в профиль...</div>
          <div class="auth-footer">Нет аккаунта? <a onclick="switchTab('reg')">Зарегистрироваться</a></div>
        </div>
      </div>

    </div>
  </div>
</main>
<footer class="footer" id="footer"></footer>
<script src="../js/data.js"></script>
<script src="../js/components.js"></script>
<script src="../js/auth.js"></script>
<script>
  renderNavbar('');
  renderFooter(false);

  // Check if already logged in
  const me = Auth.current();
  if (me) {
    document.getElementById('state-auth').style.display = 'none';
    document.getElementById('state-logged').style.display = 'block';
    document.getElementById('al-avatar').textContent = Auth.avatarLetter(me);
    document.getElementById('al-name').textContent = Auth.displayName(me);
    document.getElementById('al-sub').textContent = `${me.email} · ${Auth.joinLabel(me)}`;
    document.getElementById('auth-subtitle').textContent = 'Вы уже вошли в аккаунт';
  }

  function switchTab(tab) {
    document.getElementById('tab-reg').classList.toggle('active', tab === 'reg');
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('form-reg').style.display = tab === 'reg' ? 'block' : 'none';
    document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
    clearErrors();
  }

  function clearErrors() {
    ['reg-error','login-error'].forEach(id => {
      const el = document.getElementById(id);
      el.style.display = 'none'; el.textContent = '';
    });
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg; el.style.display = 'block';
  }

  function doRegister() {
    clearErrors();
    const first  = document.getElementById('reg-first').value.trim();
    const last   = document.getElementById('reg-last').value.trim();
    const email  = document.getElementById('reg-email').value.trim();
    const pwd    = document.getElementById('reg-password').value;
    const pwd2   = document.getElementById('reg-password2').value;
    const agreed = document.getElementById('agree').checked;

    if (!first || !last) return showError('reg-error', 'Введите имя и фамилию.');
    if (!email)          return showError('reg-error', 'Введите email.');
    if (pwd !== pwd2)    return showError('reg-error', 'Пароли не совпадают.');
    if (!agreed)         return showError('reg-error', 'Необходимо принять условия использования.');

    const result = Auth.register(first, last, email, pwd);
    if (!result.ok) return showError('reg-error', result.error);

    document.getElementById('reg-success').style.display = 'block';
    setTimeout(() => window.location.href = 'profile.html', 1500);
  }

  function doLogin() {
    clearErrors();
    const email = document.getElementById('login-email').value.trim();
    const pwd   = document.getElementById('login-password').value;

    if (!email || !pwd) return showError('login-error', 'Введите email и пароль.');

    const result = Auth.login(email, pwd);
    if (!result.ok) return showError('login-error', result.error);

    document.getElementById('login-success').style.display = 'block';
    setTimeout(() => window.location.href = 'profile.html', 1200);
  }

  function doLogout() {
    Auth.logout();
    location.reload();
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const regVisible = document.getElementById('form-reg').style.display !== 'none';
    if (regVisible) doRegister(); else doLogin();
  });

  // Live password validation
  const pwdInput = document.getElementById('reg-password');
  const pwdInput2 = document.getElementById('reg-password2');
  const strengthWrapper = document.getElementById('password-strength-wrapper');
  const strengthBar = document.getElementById('password-strength-bar');
  const strengthText = document.getElementById('password-strength-text');

  pwdInput.addEventListener('input', () => {
    const val = pwdInput.value;
    if (!val) {
      strengthWrapper.style.display = 'none';
      return;
    }
    strengthWrapper.style.display = 'block';

    let score = 0;
    if (val.length >= 8) score++;
    if (/[a-z]/.test(val)) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/\d/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    let width = '20%';
    let color = '#f43f5e'; // Red
    let text = 'Очень слабый пароль';

    if (val.length < 8) {
      width = '20%';
      color = '#f43f5e';
      text = 'Пароль слишком короткий (минимум 8 символов)';
    } else if (score === 2) {
      width = '40%';
      color = '#f97316'; // Orange
      text = 'Слабый пароль (добавьте цифры или разные регистры)';
    } else if (score === 3) {
      width = '60%';
      color = '#eab308'; // Yellow
      text = 'Средний пароль (добавьте заглавные буквы или спецсимволы)';
    } else if (score === 4) {
      width = '80%';
      color = '#6366f1'; // Indigo (var(--accent))
      text = 'Надежный пароль';
    } else if (score === 5) {
      width = '100%';
      color = '#10b981'; // Green (var(--green))
      text = 'Отличный пароль!';
    }

    strengthBar.style.width = width;
    strengthBar.style.background = color;
    strengthText.style.color = color;
    strengthText.textContent = text;
  });

  pwdInput2.addEventListener('input', () => {
    if (pwdInput2.value && pwdInput.value !== pwdInput2.value) {
      pwdInput2.classList.add('error');
    } else {
      pwdInput2.classList.remove('error');
    }
  });

  // Live email validation (Lazy pattern for best UX)
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  const regEmail = document.getElementById('reg-email');
  const loginEmail = document.getElementById('login-email');
  const emailHintWrapper = document.getElementById('email-hint-wrapper');
  const emailHintText = document.getElementById('email-hint-text');

  // Registration Email - Detailed Real-time Hint
  regEmail.addEventListener('input', () => {
    const val = regEmail.value.trim();
    if (!val) {
      emailHintWrapper.style.display = 'none';
      regEmail.classList.remove('error');
      return;
    }
    
    emailHintWrapper.style.display = 'block';
    
    // 1. Проверка на наличие символа @
    if (!val.includes('@')) {
      emailHintText.textContent = 'В адресе отсутствует символ @';
      emailHintText.style.color = '#f43f5e'; // Red
      regEmail.classList.add('error');
      return;
    }
    
    // 2. Проверка части перед @
    const parts = val.split('@');
    const localPart = parts[0];
    const domainPart = parts.slice(1).join('@');
    
    if (!localPart) {
      emailHintText.textContent = 'Введите имя пользователя перед @';
      emailHintText.style.color = '#f43f5e'; // Red
      regEmail.classList.add('error');
      return;
    }
    
    // 3. Проверка наличия домена после @
    if (!domainPart) {
      emailHintText.textContent = 'Укажите домен после @ (например, gmail.com)';
      emailHintText.style.color = '#f97316'; // Orange
      regEmail.classList.add('error');
      return;
    }
    
    // 4. Проверка точки и доменной зоны
    const dotIndex = domainPart.lastIndexOf('.');
    if (dotIndex === -1 || dotIndex === domainPart.length - 1) {
      emailHintText.textContent = 'Укажите доменную зону (например, .ru или .com)';
      emailHintText.style.color = '#eab308'; // Yellow
      regEmail.classList.add('error');
      return;
    }
    
    const tld = domainPart.substring(dotIndex + 1);
    if (tld.length < 2) {
      emailHintText.textContent = 'Доменная зона должна быть не короче 2 символов';
      emailHintText.style.color = '#eab308'; // Yellow
      regEmail.classList.add('error');
      return;
    }
    
    // 5. Проверка финального формата
    if (!emailRegex.test(val)) {
      emailHintText.textContent = 'Email содержит некорректные символы';
      emailHintText.style.color = '#f43f5e';
      regEmail.classList.add('error');
      return;
    }
    
    // Все проверки пройдены
    emailHintText.textContent = 'Email введен корректно!';
    emailHintText.style.color = '#10b981'; // Green
    regEmail.classList.remove('error');
  });

  // Login Email
  loginEmail.addEventListener('blur', () => {
    if (loginEmail.value && !emailRegex.test(loginEmail.value.trim())) {
      loginEmail.classList.add('error');
    } else {
      loginEmail.classList.remove('error');
    }
  });
  loginEmail.addEventListener('input', () => {
    if (loginEmail.classList.contains('error')) {
      if (!loginEmail.value || emailRegex.test(loginEmail.value.trim())) {
        loginEmail.classList.remove('error');
      }
    }
  });
</script>
</body>
</html>
